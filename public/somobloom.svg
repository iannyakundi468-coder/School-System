<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sun -->
  <g transform="translate(140, 40)">
    <circle cx="50" cy="50" r="28" fill="#F8A53A" />
    <path d="M 50 10 L 50 0 M 50 90 L 50 100 M 10 50 L 0 50 M 90 50 L 100 50" stroke="#F8A53A" stroke-width="6" stroke-linecap="round"/>
    <path d="M 22 22 L 15 15 M 78 78 L 85 85 M 22 78 L 15 85 M 78 22 L 85 15" stroke="#F8A53A" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Right Orange Leaf -->
  <path d="M 190 150 C 190 100, 240 70, 260 80 C 270 120, 230 160, 190 150 Z" fill="#F4953B" opacity="0.9" />

  <!-- Book Pages & Leaves (Blue) -->
  <g transform="translate(30, 110)">
    <!-- Base Book Shape -->
    <path d="M 20 100 C 40 100, 80 130, 100 160 C 100 160, 50 140, 20 140 Z" fill="#367BD4" />
    <path d="M 20 80 C 40 80, 80 110, 100 160 C 100 160, 50 110, 20 110 Z" fill="#4AA0EF" opacity="0.7"/>
    <path d="M 20 60 C 40 60, 80 90, 100 160 C 100 160, 50 80, 20 80 Z" fill="#67C6FB" opacity="0.5"/>
    
    <!-- Central Leaf merging with Book -->
    <path d="M 60 70 C 60 20, 110 -20, 140 0 C 150 40, 120 100, 100 160 C 80 120, 60 90, 60 70 Z" fill="url(#blueGrad)" />

    <!-- Upward Arrow -->
    <path d="M 120 130 L 170 80 L 170 100 L 120 150 Z" fill="#2E69BB" />
    <path d="M 150 80 L 170 80 L 170 100 Z" fill="#2E69BB" />

    <!-- Spine -->
    <path d="M 10 60 Q 20 110 30 160" fill="none" stroke="#2E69BB" stroke-width="12" stroke-linecap="round"/>
  </g>

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#73D5FE" />
      <stop offset="50%" stop-color="#418CED" />
      <stop offset="100%" stop-color="#144697" />
    </linearGradient>
  </defs>
</svg>
