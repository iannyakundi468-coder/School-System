name = "school-system"
compatibility_date = "2024-03-20"

[assets]
directory = "dist"

[vars]

[[d1_databases]]
binding = "DB"
database_name = "your-d1-db-name-here" # Not required for production deployment via Cloudflare Dashboard, but useful for local
database_id = "your-d1-db-id-here"     # Replace with your actual D1 DB ID for remote wrangler commands

[ai]
binding = "AI"
